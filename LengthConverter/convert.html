<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Length Conversion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0; /* Light gray background for the page */
        }

        .converter-box {
            background-color: #ffffcc; /* Light yellow background as in the image */
            border: 2px solid #000; /* Black border as shown */
            padding: 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
            border-radius: 5px; /* Slightly rounded corners */
        }

        h2 {
            margin-top: 0;
            color: #0000ff; /* Blue heading as in the image */
            font-size: 24px;
            font-weight: bold;
        }

        .row {
            margin: 15px 0;
            text-align: left;
            display: flex;
            align-items: center;
        }

        label {
            font-weight: bold;
            margin-right: 10px;
        }

        input[type="number"] {
            width: 80px; /* Match the input width in the image */
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        select {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background-color: #fff;
            margin-left: 10px; /* Move selection box towards left */
        }

        button {
            margin-top: 10px;
            padding: 5px 15px;
            background-color: #d3d3d3; /* Light gray button as in the image */
            border: 1px solid #000;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #b0b0b0; /* Slightly darker gray on hover */
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="converter-box">
        <h2>Length Conversion</h2>
        <div class="row">
            <label for="fromValue">From:</label>
            <input type="number" id="fromValue" step="any" min="0">
            <select id="fromUnit">
                <option value="meters">Meters</option>
                <option value="kilometers">Kilometers</option>
                <option value="millimeters">Millimeters</option>
            </select>
        </div>
        <div class="row">
            <label for="toUnit">To:</label>
            <select id="toUnit">
                <option value="meters">Meters</option>
                <option value="kilometers">Kilometers</option>
                <option value="millimeters">Millimeters</option>
            </select>
        </div>
        <button onclick="convertLength()">SUBMIT</button>
        <div id="result"></div>
        <div class="footer">
            ALL rights reserved Copyright © 2011. By {your complete name here}
        </div>
    </div>

    <script>
        function convertLength() {
            // Get the input value and units
            const fromValue = parseFloat(document.getElementById("fromValue").value);
            const fromUnit = document.getElementById("fromUnit").value;
            const toUnit = document.getElementById("toUnit").value;
            const resultDiv = document.getElementById("result");

            // Validate input
            if (isNaN(fromValue) || fromValue < 0) {
                resultDiv.innerHTML = "Please enter a valid positive number.";
                return;
            }

            // Convert the input value to meters first (as a base unit)
            let valueInMeters;
            if (fromUnit === "meters") {
                valueInMeters = fromValue;
            } else if (fromUnit === "kilometers") {
                valueInMeters = fromValue * 1000; // 1 km = 1000 meters
            } else if (fromUnit === "millimeters") {
                valueInMeters = fromValue / 1000; // 1 mm = 0.001 meters
            }

            // Convert from meters to the target unit
            let result;
            if (toUnit === "meters") {
                result = valueInMeters;
            } else if (toUnit === "kilometers") {
                result = valueInMeters / 1000; // 1 meter = 0.001 km
            } else if (toUnit === "millimeters") {
                result = valueInMeters * 1000; // 1 meter = 1000 mm
            }

            // Display the result using innerHTML
            resultDiv.innerHTML = `${fromValue} ${fromUnit} = ${result.toFixed(2)} ${toUnit}`;
        }
    </script>
</body>
</html>
