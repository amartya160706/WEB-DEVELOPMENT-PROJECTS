<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="container">
        <h2>Signup Form</h2>
        <form id="signupForm" onsubmit="return validateForm()">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" maxlength="60"><br>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" maxlength="40"><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" maxlength="8"><br>

            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" maxlength="8"><br>

            <button type="submit">OK</button>
        </form>
    </div>
    <script src="validate_signup.js"></script>
</body>
</html>
